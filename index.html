<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Contenido SecureTech</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    label { display: block; margin-top: 10px; }
    select, button { margin-top: 5px; padding: 8px; }
    #output { margin-top: 20px; padding: 15px; border: 1px solid #ccc; white-space: pre-line; }
    /* 🔹 Estilo del spinner */
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #387D7A; /* Pine Blue */
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h1>Generador de Contenido SecureTech</h1>
  <!-- 🔹 FORMULARIO PRINCIPAL -->
  <form id="generatorForm">
    <label>Servicio:
      <select id="service">
        <option value="mantenimiento">Mantenimiento Preventivo de PC</option>
        <option value="antivirus">Venta de Antivirus Kaspersky</option>
        <option value="licencias365">Licencias Microsoft 365</option>
        <option value="licenciasWindows">Licencias Windows Originales</option>
      </select>
    </label>
    <label>Tipo de contenido:
      <select id="contentType">
        <option value="educativo">Educativo (tips, tutoriales)</option>
        <option value="promocional">Promocional (ofertas, servicios)</option>
        <option value="testimonial">Testimonial (experiencias de clientes)</option>
      </select>
    </label>
    <label>Tipo de cliente:
      <select id="clientType">
        <option value="hogares">Hogares</option>
        <option value="estudiantes">Estudiantes</option>
        <option value="profesionales">Profesionales</option>
        <option value="negocios">Negocios pequeños</option>
      </select>
    </label>
    <label>Red social:
      <select id="social">
        <option value="facebook">Facebook</option>
        <option value="instagram">Instagram</option>
        <option value="whatsapp">WhatsApp</option>
      </select>
    </label>

    <!-- 🔹 BOTONES -->
    <button type="button" onclick="generateAll()">Generar Texto + Imagen</button>
    <button type="button" onclick="downloadContent()">Descargar Texto + Imagen</button>
  </form>

  <!-- 🔹 RESULTADOS DE TEXTO -->
  <div id="output"></div>

  <!-- 🔹 SPINNER DE CARGA -->
  <div class="spinner" id="spinner"></div>
  <!-- 🔹 CONTENEDOR DE IMAGEN -->
  <div id="imageContainer" style="position:relative; display:inline-block; margin-top:20px;">
    <img id="imageOutput" style="width:500px; border:1px solid #ccc;">
    <img src="Logo-secure-tech.png" 
         style="position:absolute; bottom:10px; right:10px; width:100px;">
  </div>
  <!-- 🔹 SCRIPT DE FUNCIONES -->
  <script>
    let lastCopy = "";
    let lastImageBase64 = "";

    async function generateAll() {
      const service = document.getElementById('service').value;
      const contentType = document.getElementById('contentType').value;
      const clientType = document.getElementById('clientType').value;
      const social = document.getElementById('social').value;

      const apiKey = "AQ.Ab8RN6IUTz8qDqjLoV1f4cwZ8wNN1y2E_Q81L9Hqi7YE6UKmPw"; // ⚠️ Reemplaza con tu clave real de Gemini

      // Mostrar spinner y mensaje de carga
      document.getElementById('spinner').style.display = "block";
      document.getElementById('output').innerText = "⏳ Generando contenido, por favor espera...";
      document.getElementById('imageOutput').src = "";

      // 🔹 Aquí van los prompts optimizados (igual que ya los tienes en tu versión)
      // ... (bloque de if/else con textPrompt e imagePrompt) ...
let textPrompt = "";
let imagePrompt = "";

if (service === "mantenimiento") {
  textPrompt = `Genera un texto publicitario para SecureTech Preventive Solutions.
  Servicio: Mantenimiento preventivo de computadores.
  Enfócate en la importancia de prolongar la vida útil del equipo, mejorar el rendimiento y evitar fallas críticas.
  Cliente objetivo: ${clientType}.
  Red social: ${social}.
  Incluye siempre estos datos de contacto:
  Felipe Vásquez – 3017878213 | Johan Juzga – 3003270624 | securetechps@outlook.com.
  Usa tono profesional, claro y confiable.
  Añade hashtags como #MantenimientoPC #ComputadoresSeguros #SecureTech.`;
  imagePrompt = `Crea una imagen corporativa para promocionar el servicio de mantenimiento preventivo de computadores.
  Estilo: profesional, limpio y tecnológico.
  Colores: Pine Blue (#387D7A), Twilight Indigo (#273469), Lavender Gray (#AAADC4).
  Deja espacio en la esquina inferior derecha para colocar el logo de la empresa.`;
} else if (service === "antivirus") {
  textPrompt = `Genera un texto publicitario para SecureTech Preventive Solutions.
  Servicio: Venta de licencias de Antivirus Kaspersky.
  Resalta la protección contra virus, malware y amenazas en línea, con soporte confiable.
  Cliente objetivo: ${clientType}.
  Red social: ${social}.
  Incluye siempre estos datos de contacto:
  Felipe Vásquez – 3017878213 | Johan Juzga – 3003270624 | securetechps@outlook.com.
  Usa tono persuasivo y confiable.
  Añade hashtags como #Kaspersky #ProtecciónDigital #SecureTech.`;
  imagePrompt = `Crea una imagen publicitaria para promocionar licencias de Antivirus Kaspersky.
  Estilo: corporativo, seguro y tecnológico.
  Colores: Pine Blue (#387D7A), Twilight Indigo (#273469), Lavender Gray (#AAADC4).
  Deja espacio en la esquina inferior derecha para colocar el logo de la empresa.`;
} else if (service === "licencias365") {
  textPrompt = `Genera un texto publicitario para SecureTech Preventive Solutions.
  Servicio: Venta de licencias Microsoft 365 originales.
  Resalta las ventajas de productividad, colaboración en la nube y seguridad empresarial.
  Cliente objetivo: ${clientType}.
  Red social: ${social}.
  Incluye siempre estos datos de contacto:
  Felipe Vásquez – 3017878213 | Johan Juzga – 3003270624 | securetechps@outlook.com.
  Usa tono profesional y confiable.
  Añade hashtags como #Microsoft365 #Productividad #SecureTech.`;
  imagePrompt = `Crea una imagen publicitaria para promocionar licencias Microsoft 365 originales.
  Estilo: corporativo, moderno y enfocado en productividad.
  Colores: Pine Blue (#387D7A), Twilight Indigo (#273469), Lavender Gray (#AAADC4).
  Deja espacio en la esquina inferior derecha para colocar el logo de la empresa.`;
} else if (service === "licenciasWindows") {
  textPrompt = `Genera un texto publicitario para SecureTech Preventive Solutions.
  Servicio: Venta de licencias Windows originales.
  Resalta la seguridad, estabilidad y soporte oficial de Microsoft.
  Cliente objetivo: ${clientType}.
  Red social: ${social}.
  Incluye siempre estos datos de contacto:
  Felipe Vásquez – 3017878213 | Johan Juzga – 3003270624 | securetechps@outlook.com.
  Usa tono claro y confiable.
  Añade hashtags como #WindowsOriginal #SeguridadDigital #SecureTech.`;
  imagePrompt = `Crea una imagen publicitaria para promocionar licencias Windows originales.
  Estilo: corporativo, confiable y tecnológico.
  Colores: Pine Blue (#387D7A), Twilight Indigo (#273469), Lavender Gray (#AAADC4).
  Deja espacio en la esquina inferior derecha para colocar el logo de la empresa.`;
}

      try {
  // 🔹 Llamada a Gemini para texto
  const textResponse = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=" + apiKey, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: textPrompt }] }] })
  });
  const textData = await textResponse.json();

  if (!textData.candidates || !textData.candidates[0]) {
    console.error("Error en respuesta de Gemini (texto):", textData);
    document.getElementById('output').innerText = "❌ No se pudo generar el texto. Verifica tu API Key o conexión.";
    document.getElementById('spinner').style.display = "none";
    return;
  }

  lastCopy = textData.candidates[0].content.parts[0].text;
  document.getElementById('output').innerText = lastCopy;

  // 🔹 Llamada a Gemini para imagen
  const imageResponse = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateImage?key=" + apiKey, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ prompt: imagePrompt })
});
const imageData = await imageResponse.json();

if (!imageData.image) {
  console.error("Error en respuesta de Gemini (imagen):", imageData);
  document.getElementById('output').innerText = "❌ No se pudo generar la imagen.";
  document.getElementById('spinner').style.display = "none";
  return;
}

lastImageBase64 = imageData.image;
document.getElementById('imageOutput').src = "data:image/png;base64," + lastImageBase64;

 if (!imageData.candidates || !imageData.candidates[0]) {
  console.error("Error en respuesta de Gemini (imagen):", imageData);
  document.getElementById('output').innerText = "❌ No se pudo generar la imagen.";
  document.getElementById('spinner').style.display = "none";
  return;
}

lastImageBase64 = imageData.candidates[0].content.parts[0].text;
  document.getElementById('imageOutput').src = "data:image/png;base64," + lastImageBase64;

} catch (error) {
  document.getElementById('output').innerText = "❌ Ocurrió un error al generar el contenido.";
  console.error(error);
} finally {
  document.getElementById('spinner').style.display = "none";
}

    }

    function downloadContent() {
      // Descargar texto como .txt
      const textBlob = new Blob([lastCopy], { type: "text/plain" });
      const textUrl = URL.createObjectURL(textBlob);
      const textLink = document.createElement("a");
      textLink.href = textUrl;
      textLink.download = "contenido-securetech.txt";
      textLink.click();

      // Descargar imagen como .png
      const imageLink = document.createElement("a");
      imageLink.href = "data:image/png;base64," + lastImageBase64;
      imageLink.download = "imagen-securetech.png";
      imageLink.click();
    }
  </script>
</body>
</html>
