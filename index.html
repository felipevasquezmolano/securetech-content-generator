<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Contenido SecureTech</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; max-width: 800px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    select, button { margin-top: 5px; padding: 10px; width: 100%; }
    #output { margin-top: 20px; padding: 15px; border: 1px solid #ccc; white-space: pre-line; background: #f9f9f9; }
    .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #387D7A; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Generador de Contenido SecureTech</h1>
  <form id="generatorForm">
    <!-- Tus selects originales -->
    <label>Servicio: <select id="service"><option value="mantenimiento">Mantenimiento Preventivo</option><option value="antivirus">Venta de Antivirus</option></select></label>
    <label>Tipo de contenido: <select id="contentType"><option value="educativo">Educativo</option><option value="promocional">Promocional</option></select></label>
    <label>Tipo de cliente: <select id="clientType"><option value="hogares">Hogares</option><option value="profesionales">Profesionales</option></select></label>
    <label>Red social: <select id="social"><option value="facebook">Facebook</option><option value="instagram">Instagram</option></select></label>
    <button type="button" onclick="generateAll()" style="background:#387D7A; color:white; border:none; cursor:pointer; margin-top:20px;">Generar Contenido</button>
  </form>

  <div class="spinner" id="spinner"></div>
  <div id="output"></div>
  <img id="imageOutput" style="width:100%; max-width:500px; margin-top:20px;">

  <script>
    async function generateAll() {
      document.getElementById('spinner').style.display = "block";
      const response = await fetch('/api/generate', {
        method: 'POST',
        body: JSON.stringify({
          service: document.getElementById('service').value,
          contentType: document.getElementById('contentType').value,
          clientType: document.getElementById('clientType').value,
          social: document.getElementById('social').value
        })
      });
      const data = await response.json();
      document.getElementById('output').innerText = data.text;
      document.getElementById('imageOutput').src = data.imageUrl;
      document.getElementById('spinner').style.display = "none";
    }
  </script>
</body>
</html>
