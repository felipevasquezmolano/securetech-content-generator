<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generador de Contenido SecureTech</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; max-width: 800px; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    select, button, input { margin-top: 5px; padding: 10px; width: 100%; }
    #output { margin-top: 20px; padding: 15px; border: 1px solid #ccc; white-space: pre-line; background: #f9f9f9; }
    .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #387D7A; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Generador de Contenido SecureTech</h1>

  <label>Tu API Key (AIza...):
    <input type="password" id="apiKey" placeholder="Pega aquí tu clave de AI Studio">
  </label>

  <form id="generatorForm">
    <label>Servicio:
      <select id="service">
        <option value="mantenimiento">Mantenimiento Preventivo de PC</option>
        <option value="antivirus">Venta de Antivirus Kaspersky</option>
        <option value="licencias365">Licencias Microsoft 365</option>
        <option value="licenciasWindows">Licencias Windows Originales</option>
      </select>
    </label>
    <label>Tipo de contenido:
      <select id="contentType">
        <option value="educativo">Educativo (tips, tutoriales)</option>
        <option value="promocional">Promocional (ofertas, servicios)</option>
      </select>
    </label>
    <label>Tipo de cliente:
      <select id="clientType">
        <option value="hogares">Hogares</option>
        <option value="estudiantes">Estudiantes</option>
        <option value="profesionales">Profesionales</option>
        <option value="negocios">Negocios pequeños</option>
      </select>
    </label>
    <label>Red social:
      <select id="social">
        <option value="facebook">Facebook</option>
        <option value="instagram">Instagram</option>
        <option value="whatsapp">WhatsApp</option>
      </select>
    </label>

    <button type="button" onclick="generateAll()" style="background:#387D7A; color:white; border:none; cursor:pointer; margin-top:20px;">Generar Contenido</button>
  </form>

  <div class="spinner" id="spinner"></div>
  <div id="output"></div>
  <div id="imageContainer" style="margin-top:20px;">
    <img id="imageOutput" style="width:100%; max-width:500px; border:1px solid #ccc;">
  </div>

  <script>
    async function generateAll() {
      const apiKey = document.getElementById('apiKey').value;
      if (!apiKey) { alert("Por favor ingresa tu API Key"); return; }

      const service = document.getElementById('service').value;
      const clientType = document.getElementById('clientType').value;
      const social = document.getElementById('social').value;

      document.getElementById('spinner').style.display = "block";
      document.getElementById('output').innerText = "⏳ Generando...";

      // Prompt optimizado
      const promptText = `Crea un post para ${social} sobre ${service}. Dirigido a ${clientType}. Incluye: Felipe Vásquez 3017878213 | Johan Juzga 3003270624 | securetechps@outlook.com. Usa tono profesional.`;
      const promptImg = `Professional technology service, ${service}, modern style, blue and gray colors, high quality.`;

      try {
        // Llamada a Gemini (Texto)
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        
        const data = await response.json();
        const text = data.candidates[0].content.parts[0].text;
        document.getElementById('output').innerText = text;

        // Generar Imagen con Pollinations
        document.getElementById('imageOutput').src = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptImg)}?width=1080&height=1080&nologo=true`;
        
      } catch (err) {
        document.getElementById('output').innerText = "Error: " + err.message;
      } finally {
        document.getElementById('spinner').style.display = "none";
      }
    }
  </script>
</body>
</html>
